name: lint

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          ignore_paths: docs
          severity: warning

      - name: bash syntax
        run: |
          set -e
          bash -n install.sh
          printf '✓ install.sh parses cleanly\n'
